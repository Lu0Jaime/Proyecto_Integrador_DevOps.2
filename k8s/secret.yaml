# ══════════════════════════════════════════════════════════════
#  Kubernetes Secret — Cartera Fiscal
#  IMPORTANTE: Reemplaza los valores con tus datos en base64
#  Para codificar en base64 usa PowerShell:
#  [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("tu-valor-aqui"))
# ══════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: supabase-secret
type: Opaque
data:
  # Reemplaza con tu URL de Supabase en base64
  supabase-url: REEMPLAZAR_CON_BASE64_DE_TU_URL
  # Reemplaza con tu Anon Key de Supabase en base64
  supabase-anon-key: REEMPLAZAR_CON_BASE64_DE_TU_ANON_KEY
