# ══════════════════════════════════════════════════════════════
#  Kubernetes Service — Cartera Fiscal
#  Tipo NodePort para acceso desde Minikube
# ══════════════════════════════════════════════════════════════

apiVersion: v1
kind: Service
metadata:
  name: cartera-fiscal
  labels:
    app: cartera-fiscal
spec:
  type: NodePort
  selector:
    app: cartera-fiscal
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
